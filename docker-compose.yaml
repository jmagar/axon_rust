name: axon

# AXON_DATA_DIR controls where persistent data is stored on the host.
# Example: AXON_DATA_DIR=/home/yourname/appdata
# Service mounts use a unified tree under AXON_DATA_DIR/axon/.
# See .env.example for the full list of environment variables.

x-common-service: &common-service
  env_file:
    - .env
  networks:
    - axon
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

services:
  axon-postgres:
    <<: *common-service
    image: postgres:17-alpine
    container_name: axon-postgres
    ports:
      - "127.0.0.1:53432:5432"  # homelab-only: not exposed to network
    volumes:
      - ${AXON_DATA_DIR:-./data}/axon/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  axon-redis:
    <<: *common-service
    image: redis:8.2-alpine
    container_name: axon-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-changeme}"]
    ports:
      - "127.0.0.1:53379:6379"  # homelab-only: not exposed to network
    volumes:
      - ${AXON_DATA_DIR:-./data}/axon/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  axon-rabbitmq:
    <<: *common-service
    image: rabbitmq:4.0-management
    container_name: axon-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-axon}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-axonrabbit}
    ports:
      - "127.0.0.1:45535:5672"  # homelab-only: not exposed to network
    volumes:
      - ${AXON_DATA_DIR:-./data}/axon/rabbitmq:/var/lib/rabbitmq
      - ./docker/rabbitmq/20-axon.conf:/etc/rabbitmq/conf.d/20-axon.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  axon-qdrant:
    <<: *common-service
    image: qdrant/qdrant:v1.13.1
    container_name: axon-qdrant
    ports:
      - "127.0.0.1:53333:6333"  # homelab-only: not exposed to network
      - "127.0.0.1:53334:6334"  # gRPC — homelab-only
    volumes:
      - ${AXON_DATA_DIR:-./data}/axon/qdrant:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/bash",
          "-ec",
          "exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /readyz HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep -q \"200\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  axon-chrome:
    # headless_browser manager + chrome-headless-shell
    # Port 6000: management API (/json/version, /fork, /shutdown)
    # Port 9222: CDP proxy — pointed at by AXON_CHROME_REMOTE_URL
    container_name: axon-chrome
    build:
      context: .
      dockerfile: docker/chrome/Dockerfile
    env_file: []  # no app secrets needed in the browser container
    shm_size: "2gb"
    ports:
      - "127.0.0.1:9222:9222"  # CDP proxy — local dev access
      - "127.0.0.1:9223:9223"  # raw Chrome DevTools — direct CDP access
      - "127.0.0.1:6000:6000"  # management API — local dev access
    environment:
      # Rewrite the hostname in /json/version WebSocket URLs so that other
      # containers on the axon network receive a resolvable address.
      HOSTNAME_OVERRIDE: axon-chrome
    networks:
      - axon
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL --max-time 4 http://127.0.0.1:6000/json/version > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  axon-workers:
    <<: *common-service
    container_name: axon-workers
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        AXON_GIT_SHA: ${AXON_GIT_SHA:-dev}
      # Inject spider_agent and its transitive path deps as named BuildKit
      # contexts so they are available without widening the build context
      # to the whole workspace.
      additional_contexts:
        spider-agent: ../spider/spider_agent
        spider-agent-types: ../spider/spider_agent_types
        spider-agent-html: ../spider/spider_agent_html
    environment:
      RUST_LOG: "info"
      HOME: /home/axon
      AXON_OUTPUT_DIR: /app/.cache/axon-rust/output
      AXON_CHROME_DIAGNOSTICS_DIR: /app/.cache/chrome-diagnostics
      AXON_ENFORCE_IMAGE_SHA: ${AXON_ENFORCE_IMAGE_SHA:-false}
    depends_on:
      axon-postgres:
        condition: service_healthy
      axon-redis:
        condition: service_healthy
      axon-rabbitmq:
        condition: service_healthy
      axon-qdrant:
        condition: service_healthy
      axon-chrome:
        condition: service_started  # Chrome unhealthy (GPU crash etc.) must not block workers
    ports:
      - "127.0.0.1:49000:49000"   # axon serve (HTTP + WebSocket)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "[ ! -f /run/sha-guard-failed ] && /command/s6-svstat -u /run/service/crawl-worker >/dev/null && /command/s6-svstat -u /run/service/extract-worker >/dev/null && /command/s6-svstat -u /run/service/embed-worker >/dev/null && /command/s6-svstat -u /run/service/ingest-worker >/dev/null && /command/s6-svstat -u /run/service/web-server >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./:/repo:ro
      - ${AXON_DATA_DIR:-./data}/axon/worker:/app/.cache/axon-rust/output
      - ${AXON_DATA_DIR:-./data}/axon/logs:/app/logs
      - ${AXON_DATA_DIR:-./data}/axon/chrome-diagnostics:/app/.cache/chrome-diagnostics
      # Session history mounts — required for `axon sessions` ingest worker.
      # Set HOST_HOME in .env to your home directory (e.g. /home/yourname).
      - ${HOST_HOME:-${HOME}}/.claude/projects:/home/axon/.claude/projects
      - ${HOST_HOME:-${HOME}}/.codex/sessions:/home/axon/.codex/sessions
      - ${HOST_HOME:-${HOME}}/.gemini:/home/axon/.gemini

  axon-web:
    <<: *common-service
    container_name: axon-web
    build:
      context: apps/web
      dockerfile: ../../docker/web/Dockerfile
      args:
        AXON_GIT_SHA: ${AXON_GIT_SHA:-dev}
      additional_contexts:
        web-s6: docker/web/s6-rc.d
        web-cont-init: docker/web/cont-init.d
    ports:
      - "49010:49010"
    environment:
      HOST: "0.0.0.0"
      HOME: /home/node
      PORT: "49010"
      AXON_ENFORCE_IMAGE_SHA: ${AXON_ENFORCE_IMAGE_SHA:-false}
      AXON_BACKEND_URL: "http://axon-workers:49000"
      NEXT_PUBLIC_AXON_PORT: "49000"
      AXON_WORKSPACE: /workspace
      AXON_OUTPUT_DIR: /axon-output  # same host dir as axon-workers output, ro-mounted at /axon-output
      AXON_BIN: ${AXON_BIN:-}        # override binary path for /api/cortex/* routes (see .env.example)
      # Set WATCHPACK_POLLING=true in .env if file-watch events don't propagate
    volumes:
      - ./:/repo:ro
      - ./apps/web:/app               # bind-mount source for hot reload
      - /app/node_modules             # anonymous vol: preserves container's node_modules
      - /app/.next                    # anonymous vol: preserves Next.js build cache
      - ${AXON_DATA_DIR:-./data}/axon/worker:/axon-output:ro  # axon scrape/crawl output (read-only)
      - ${AXON_DATA_DIR:-./data}/axon/claude:/home/node/.claude
      - ${HOST_HOME:-${HOME}}/.claude.json:/home/node/.claude.json  # auth file — separate from config dir
      # Uncomment to mount host SSH keys (opt-in — exposes keys to the container):
      # - ${HOST_HOME:-${HOME}}/.ssh:/home/node/.ssh:ro
      - ${AXON_WORKSPACE:-${HOME}/workspace}:/workspace
      - /var/run/docker.sock:/var/run/docker.sock:ro  # required for /api/logs (dockerode)
    group_add:
      - "981"  # host docker group GID — grants node user socket access
    depends_on:
      axon-workers:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "[ ! -f /run/sha-guard-failed ] && curl -fsSL --max-time 4 http://127.0.0.1:49010/evaluate > /dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  axon:
    driver: bridge

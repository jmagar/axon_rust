name: cortex

x-common-service: &common-service
  env_file:
    - .env
  networks:
    - cortex
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

services:
  axon-postgres:
    <<: *common-service
    image: postgres:17-alpine
    container_name: axon-postgres
    ports:
      - "127.0.0.1:53432:5432"  # homelab-only: not exposed to network
    volumes:
      - /home/jmagar/appdata/axon-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  axon-redis:
    <<: *common-service
    image: redis:8.2-alpine
    container_name: axon-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-changeme}"]
    ports:
      - "127.0.0.1:53379:6379"  # homelab-only: not exposed to network
    volumes:
      - /home/jmagar/appdata/axon-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  axon-rabbitmq:
    <<: *common-service
    image: rabbitmq:4.0-management
    container_name: axon-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-axon}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-axonrabbit}
    ports:
      - "127.0.0.1:45535:5672"  # homelab-only: not exposed to network
    volumes:
      - /home/jmagar/appdata/axon-rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  axon-qdrant:
    <<: *common-service
    image: qdrant/qdrant:v1.13.1
    container_name: axon-qdrant
    ports:
      - "127.0.0.1:53333:6333"  # homelab-only: not exposed to network
      - "127.0.0.1:53334:6334"  # gRPC — homelab-only
    volumes:
      - /home/jmagar/appdata/axon-qdrant:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /readyz HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep -q \"200\"'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  axon-workers:
    <<: *common-service
    container_name: axon-workers
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      axon-postgres:
        condition: service_healthy
      axon-redis:
        condition: service_healthy
      axon-rabbitmq:
        condition: service_healthy
      axon-qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck-workers.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - /home/jmagar/appdata/axon-worker-output:/app/.cache/axon-rust/output

networks:
  cortex:
    driver: bridge

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_infra_tests:
        description: "Run infra-backed ignored worker_e2e tests"
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: ""

jobs:
  advisory-lock-policy:
    name: advisory-lock-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ban session-scoped advisory lock APIs
        run: |
          set -euo pipefail
          if rg -n "pg_advisory_lock\\s*\\(|pg_advisory_unlock\\s*\\(" crates; then
            echo "Found banned session-scoped advisory lock usage. Use pg_advisory_xact_lock via begin_schema_migration_tx."
            exit 1
          fi
      - name: Check ensure_schema uses advisory lock
        run: |
          set -euo pipefail
          failures=()
          for file in $(rg -l 'ensure_schema' crates/jobs/ 2>/dev/null || true); do
            if ! rg -q 'begin_schema_migration_tx|advisory' "$file" 2>/dev/null; then
              failures+=("$file")
            fi
          done
          if [ ${#failures[@]} -gt 0 ]; then
            echo "ERROR: The following files have ensure_schema() without advisory lock:"
            printf '  %s\n' "${failures[@]}"
            exit 1
          fi
          echo "OK: All ensure_schema() implementations use advisory lock"

  monolith:
    name: monolith
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce monolith policy (changed Rust files only)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            BASE_SHA="$PR_BASE_SHA"
          else
            BASE_SHA="$PUSH_BEFORE_SHA"
          fi

          if [[ -z "$BASE_SHA" ]] || [[ "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="$(git rev-parse HEAD^)"
          fi

          # Prefer repo-local script (always available in CI checkout)
          if [ -f "scripts/enforce_monoliths.py" ]; then
            python3 scripts/enforce_monoliths.py --base "$BASE_SHA" --head "$HEAD_SHA"
          elif [ -f "$HOME/.claude/hooks/enforce_monoliths.py" ]; then
            python3 "$HOME/.claude/hooks/enforce_monoliths.py" --base "$BASE_SHA" --head "$HEAD_SHA"
          else
            echo "ERROR: enforce_monoliths.py not found in scripts/ or ~/.claude/hooks/" && exit 1
          fi

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt check
        run: cargo fmt --all -- --check

  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (warnings are errors)
        env:
          RUSTFLAGS: -D warnings
        run: cargo check --all-targets --locked

  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.87.0
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (MSRV)
        run: cargo check --all-targets --locked

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: axon
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: axon
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:4.0-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      qdrant:
        image: qdrant/qdrant:v1.13.1
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -fsS http://localhost:6333/healthz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      AXON_TEST_PG_URL: postgresql://axon:postgres@localhost:5432/axon
      AXON_TEST_REDIS_URL: redis://localhost:6379
      AXON_TEST_AMQP_URL: amqp://guest:guest@localhost:5672/%2f
      AXON_TEST_QDRANT_URL: http://localhost:6333
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --all --locked

      - name: ask quality regression fixtures
        run: ./scripts/test-ask-quality-regressions.sh

  test-infra:
    name: test-infra
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_infra_tests == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: axon
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: axon
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:4.0-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      AXON_TEST_PG_URL: postgresql://axon:postgres@localhost:5432/axon
      AXON_TEST_REDIS_URL: redis://localhost:6379
      AXON_TEST_AMQP_URL: amqp://guest:guest@localhost:5672/%2f
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: run ignored infra worker tests
        run: just test-infra

  web-lint-test:
    name: web-lint-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: biome lint
        run: pnpm lint
      - name: vitest
        run: pnpm test

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked

      - name: cargo audit
        run: |
          set -euo pipefail
          echo "Running cargo audit against Cargo.lock"
          cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.0 --locked

      - name: cargo deny check
        run: |
          set -euo pipefail
          echo "Running cargo deny check (advisories, bans, licenses, sources)"
          cargo deny check

  mcp-smoke:
    name: mcp-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - uses: Swatinem/rust-cache@v2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install mcporter
        run: npm install -g mcporter@0.7.3

      - name: Restore Hugging Face cache
        uses: actions/cache@v4
        with:
          path: .cache/huggingface
          key: hf-tei-${{ runner.os }}-BAAI-bge-small-en-v1.5-v1

      - name: Build axon binary (release)
        run: cargo build --release --locked --bin axon

      - name: Write CI mcporter config
        run: |
          cat > config/mcporter.json <<EOF
          {
            "mcpServers": {
              "axon": {
                "command": "${{ github.workspace }}/target/release/axon",
                "args": ["mcp"]
              }
            },
            "imports": []
          }
          EOF

      - name: Create CI .env for docker compose
        run: |
          {
            echo "AXON_DATA_DIR=./data"
            echo "HOST_HOME=/home/runner"
            echo "POSTGRES_USER=axon"
            echo "POSTGRES_PASSWORD=postgres"
            echo "POSTGRES_DB=axon"
            echo "REDIS_PASSWORD=axonredis"
            echo "RABBITMQ_USER=axon"
            echo "RABBITMQ_PASS=axonrabbit"
            echo "AXON_PG_URL=postgresql://axon:postgres@axon-postgres:5432/axon"
            echo "AXON_REDIS_URL=redis://:axonredis@axon-redis:6379"
            echo "AXON_AMQP_URL=amqp://axon:axonrabbit@axon-rabbitmq:5672/%2f"
            echo "QDRANT_URL=http://axon-qdrant:6333"
            echo "TEI_URL=http://localhost:52000"
          } > .env

      - name: Start Axon infra
        run: docker compose up -d axon-postgres axon-redis axon-rabbitmq axon-qdrant

      - name: Start TEI
        run: |
          mkdir -p .cache/huggingface
          docker run -d --name axon-tei -p 52000:80 \
            -v "$PWD/.cache/huggingface:/hf-cache" \
            -e HF_HOME=/hf-cache \
            -e HF_HUB_CACHE=/hf-cache/hub \
            ghcr.io/huggingface/text-embeddings-inference:cpu-latest \
            --model-id BAAI/bge-small-en-v1.5

      - name: Wait for Qdrant and TEI
        run: |
          for i in {1..90}; do
            if curl -fsS http://127.0.0.1:53333/healthz >/dev/null 2>&1 && \
               curl -fsS http://127.0.0.1:52000/health >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for Qdrant/TEI readiness" >&2
          exit 1

      - name: Seed retrieve fixture
        env:
          TEI_URL: http://127.0.0.1:52000
          QDRANT_URL: http://127.0.0.1:53333
          AXON_PG_URL: postgresql://axon:postgres@127.0.0.1:53432/axon
          AXON_REDIS_URL: redis://:axonredis@127.0.0.1:53379
          AXON_AMQP_URL: amqp://axon:axonrabbit@127.0.0.1:45535/%2f
          AXON_EMBED_STRICT_PREDELETE: "false"
        run: ./target/release/axon embed "docs/MCP.md" --wait true --json

      - name: Run MCP mcporter smoke script
        env:
          TEI_URL: http://127.0.0.1:52000
          QDRANT_URL: http://127.0.0.1:53333
          AXON_PG_URL: postgresql://axon:postgres@127.0.0.1:53432/axon
          AXON_REDIS_URL: redis://:axonredis@127.0.0.1:53379
          AXON_AMQP_URL: amqp://axon:axonrabbit@127.0.0.1:45535/%2f
        run: ./scripts/test-mcp-tools-mcporter.sh

      - name: Upload mcporter logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-smoke-logs
          path: .cache/mcporter-test/

      - name: Teardown infra
        if: always()
        run: |
          docker rm -f axon-tei || true
          docker compose down || true

description = "Extract structured data with lifecycle job controls"
prompt = """
Use the Axon MCP server tool (`axon`) with:
- `action: "extract"`
- `subaction: "start|status|cancel|list|cleanup|clear|recover"` from `{{args}}`
- map remaining `{{args}}` to schema fields

Requirements:
- Support start and lifecycle operations: status, cancel, list, cleanup, clear, recover.
- Parse extraction outputs, progress, and failures.
- Present extracted fields and per-URL quality issues.
- Report errors first if present.
"""

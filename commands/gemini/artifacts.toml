description = "Inspect Axon artifact files (head, grep, wc, read)"
prompt = """
Use the Axon MCP server tool (`axon`) with:
- `action: "artifacts"`
- `subaction: "head|grep|wc|read"` from `{{args}}`
- map remaining `{{args}}` to schema fields (`path`, `pattern`, `limit`, `offset`)

Requirements:
- Route operations by subaction: head, grep, wc, read.
- For grep, require a search pattern and preserve exact matching lines.
- Highlight key file insights and counts.
- Report errors first if present.
"""
